name: ci

# Both events on purpose: GitHub App-authored PRs do NOT trigger pull_request
# (anti-recursion), so `push` is the reliable signal for the agent's own fix PRs.
on:
  push:
  pull_request:

jobs:
  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Assert google-adk is pinned to 1.x
        run: |
          python - <<'PY'
          import importlib.metadata as m
          v = m.version("google-adk")
          assert v.startswith("1."), f"google-adk must be 1.x, got {v} (2.0 is a breaking rewrite)"
          print("google-adk", v, "OK")
          PY
      - name: Run tests (mock backend)
        env:
          AIRBAG_BACKEND: "mock"
        run: python -m pytest -q

  # v4 Phase 4.1 — the Phase-1 acceptance gate. Prod runs AIRBAG_STATE=firestore, but the main
  # suite pins the memory mimic; this job re-runs the state-critical suite (store contract +
  # ordered reads + the serving-history ledger + cross-incident memory + autonomy approvals)
  # against REAL google-cloud-firestore transactions on the official emulator. conftest refuses
  # this mode without FIRESTORE_EMULATOR_HOST, so it can never touch real Firestore.
  # firestore.indexes.json (repo root) is deliberately EMPTY: every Airbag query is a single-field
  # order_by+limit (auto-indexed), and the v4 ledger is a by-id document read — no composite
  # indexes exist to declare. The real hazard (order_by silently omits docs missing the order
  # field) is pinned by test_every_writer_stamps_its_order_field in this job instead.
  firestore-emulator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Start Firestore emulator
        run: |
          docker run -d --name firestore -p 8080:8080 \
            gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators \
            gcloud emulators firestore start --host-port=0.0.0.0:8080
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080 >/dev/null && echo "emulator up" && exit 0
            sleep 1
          done
          echo "emulator failed to start"; docker logs firestore; exit 1
      - name: State-critical suite on the real backend
        env:
          AIRBAG_TEST_FIRESTORE: "1"
          FIRESTORE_EMULATOR_HOST: "localhost:8080"
          GOOGLE_CLOUD_PROJECT: "airbag-test"
          AIRBAG_BACKEND: "mock"
        run: >
          python -m pytest -q
          tests/test_state_store.py tests/test_ledger.py tests/test_memory.py tests/test_autonomy.py
          tests/test_transparency.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff (real errors only — syntax + pyflakes)
        run: ruff check --select E9,F --exclude venv-test agent target-app auditor

  target-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: target-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Smoke (healthy path loads + computes revenue)
        run: python -c "import main; assert main.total_revenue(main.ORDERS) == 35, main.total_revenue(main.ORDERS); print('target-app smoke OK')"

  mcp-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - name: Contract tests (mocked HTTP — tool registration, auth gating, sanitized errors)
        run: python -m pytest -q

  # v6 Phase 4 — the offline Proof Explorer's verification core. Byte-parity gate: the JS canonicalizer
  # must emit output byte-identical to Python's canonical for every committed fixture (else a valid heal
  # shows INTEGRITY FAIL in-browser), plus WebCrypto reproduces the auditor's SIGNED-VERIFIED /
  # INTEGRITY-ONLY / FAIL verdicts against the real committed keys. node is preinstalled on the runner.
  explorer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Proof Explorer byte-parity + verify (WebCrypto core)
        run: node docs/explorer/parity-test.js

  # v6 Phase 1 — the independent Auditor service. Its verify core is stdlib + `cryptography` only
  # (the "zero agent imports" independence property is AST-enforced by test_auditor_invariant.py).
  # This job MUST exist from the SAME commit that creates auditor/tests (Round-2 #21 — a test suite
  # that never runs in CI enforces nothing); the finals ONE-test-count is agent + mcp-server + auditor.
  auditor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auditor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - name: Verify core + signer-pin tri-state tests (independent auditor kernel)
        run: python -m pytest -q

  # v6 Phase 1.2 borrow — the DSSE cosign HARD GATE (Round 3 #9). A hand-rolled DSSE fails cosign on
  # PAE / payload type / predicate type / subject digest / ECDSA encoding in ways prose review never
  # catches, so the emit path is gated by REAL cosign here: build a heal-attestation DSSE via OUR
  # construction (agent/autosre/dsse.py) signed with an ephemeral EC-P256 key (a faithful proxy for the
  # KMS EC_SIGN_P256_SHA256 identity — identical DER + PAE), and require `cosign verify-blob-attestation`
  # to accept it. Runs from the SAME commit that adds dsse.py (before the A5 emit path). If this can
  # never go green, DSSE is CUT (it is a borrow, not a phase — the auditor without DSSE still wins).
  dsse-cosign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cryptography (the construction's only dep)
        run: pip install cryptography
      - name: Install cosign (pinned)
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'
      - name: Generate an ephemeral EC-P256 key (a faithful KMS EC_SIGN_P256_SHA256 proxy)
        run: |
          openssl ecparam -genkey -name prime256v1 -noout -out dsse-key.pem
          openssl ec -in dsse-key.pem -pubout -out dsse-key.pub
      - name: Build a heal DSSE via OUR construction (agent/autosre/dsse.py)
        run: python scripts/gen_dsse_golden.py --out-dir golden --key dsse-key.pem
      - name: cosign verify-blob-attestation (the HARD GATE — our hand-rolled DSSE must satisfy cosign)
        run: |
          cosign version
          cosign verify-blob-attestation \
            --key dsse-key.pub \
            --signature golden/heal.intoto.dsse.json \
            --type airbag.dev/heal-attestation/v1 \
            --check-claims \
            --insecure-ignore-tlog \
            golden/canonical-bundle.json
