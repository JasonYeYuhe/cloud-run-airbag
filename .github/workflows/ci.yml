name: ci

# Both events on purpose: GitHub App-authored PRs do NOT trigger pull_request
# (anti-recursion), so `push` is the reliable signal for the agent's own fix PRs.
on:
  push:
  pull_request:

jobs:
  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Assert google-adk is pinned to 1.x
        run: |
          python - <<'PY'
          import importlib.metadata as m
          v = m.version("google-adk")
          assert v.startswith("1."), f"google-adk must be 1.x, got {v} (2.0 is a breaking rewrite)"
          print("google-adk", v, "OK")
          PY
      - name: Run tests (mock backend)
        env:
          AIRBAG_BACKEND: "mock"
        run: python -m pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff (real errors only — syntax + pyflakes)
        run: ruff check --select E9,F --exclude venv-test agent target-app

  target-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: target-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Smoke (healthy path loads + computes revenue)
        run: python -c "import main; assert main.total_revenue(main.ORDERS) == 35, main.total_revenue(main.ORDERS); print('target-app smoke OK')"
