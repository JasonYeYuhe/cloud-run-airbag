name: complete-rollback
# P1 "close the transaction": after a fix is merged, deploy it and ask Airbag to verify the
# fix is healthy and UNDO the temporary rollback (restore traffic to the fix). This is the
# CI-trigger path (the review consensus' "trigger via CI, not webhooks").
#
# ✅ WIRED + verified live (keyless via Workload Identity Federation — no stored key). The full
# unattended close ran end-to-end: deploy fix --no-traffic -> /internal/complete-rollback ->
# COMPLETE_ROLLBACK -> FIX_DEPLOYED -> CANARY x3 -> ROLLBACK_UNDONE -> CLOSED, no human.
# Re-create the federation with infra/wif-setup.sh; it sets these repo Settings -> Actions:
#   vars:    AIRBAG_AGENT_URL, TARGET_SERVICE, GCP_REGION, GCP_WIF_PROVIDER, GCP_DEPLOY_SA
#   secrets: AIRBAG_WEBHOOK_TOKEN
# Still GATED on those vars, so a fork without the federation stays a no-op (CI green).
on:
  push:
    branches: [main]
    paths: ['target-app/**']      # a merged fix to the target app
  workflow_dispatch:
    inputs:
      revision:
        description: "Fix revision name (optional; auto-detected from latest if blank)"
        required: false

jobs:
  deploy-and-close:
    # Gate on ALL required config so a partial setup stays a skipped (green) job, not a red one.
    if: ${{ vars.AIRBAG_AGENT_URL != '' && vars.GCP_WIF_PROVIDER != '' && vars.GCP_DEPLOY_SA != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write            # for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy the fix to Cloud Run (NO traffic — Airbag verifies before shifting)
        id: deploy
        run: |
          # --no-traffic: the new revision is created but the safe rolled-back revision keeps
          # serving. Airbag (complete_rollback) shifts traffic to it only AFTER verifying it,
          # and compensates back if it's unhealthy — traffic never moves to an unverified fix.
          gcloud run deploy "${{ vars.TARGET_SERVICE }}" --source target-app \
            --region "${{ vars.GCP_REGION }}" --allow-unauthenticated \
            --update-env-vars FAULT_MODE=off --no-traffic -q
          # use the dispatch input if given, else the just-deployed revision (either/or — no concat)
          REV="${{ github.event.inputs.revision }}"
          [ -z "$REV" ] && REV="$(gcloud run services describe "${{ vars.TARGET_SERVICE }}" \
            --region "${{ vars.GCP_REGION }}" --format='value(status.latestCreatedRevisionName)')"
          echo "revision=$REV" >> "$GITHUB_OUTPUT"
      - name: Ask Airbag to verify the fix + undo the temporary rollback
        run: |
          # /internal/complete-rollback is synchronous: 2xx = transaction CLOSED; non-2xx =
          # compensated / manual intervention -> curl -f fails the job so the team is alerted.
          curl -fsS -X POST "${{ vars.AIRBAG_AGENT_URL }}/internal/complete-rollback" \
            -H "x-airbag-token: ${{ secrets.AIRBAG_WEBHOOK_TOKEN }}" \
            -H "content-type: application/json" \
            -d "{\"service\":\"${{ vars.TARGET_SERVICE }}\",\"revision\":\"${{ steps.deploy.outputs.revision }}\",\"git_sha\":\"${GITHUB_SHA}\"}"
